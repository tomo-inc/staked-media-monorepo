<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>FoxSpark</title>
    <style>
      :root {
        --bg: #f3f5fb;
        --card: #ffffff;
        --card-alt: #f8fafc;
        --header-bg: #eff6ff;
        --ink: #111827;
        --muted: #4b5563;
        --muted-strong: #475569;
        --line: #d8deea;
        --line-soft: #dbe3ef;
        --line-strong: #cbd5e1;
        --line-contrast: #94a3b8;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --primary-soft: rgba(37, 99, 235, 0.08);
        --primary-soft-border: rgba(37, 99, 235, 0.12);
        --focus: rgba(37, 99, 235, 0.15);
        --good: #16a34a;
        --good-soft: rgba(22, 163, 74, 0.08);
        --warn: #d97706;
        --warn-soft: rgba(220, 38, 38, 0.08);
        --error: #dc2626;
        --hover: #f1f5f9;
        --menu-shadow: 0 8px 20px rgba(15, 23, 42, 0.1);
      }

      html[data-options-theme="dark"] {
        --bg: #020617;
        --card: #0f172a;
        --card-alt: #111827;
        --header-bg: #111827;
        --ink: #f8fafc;
        --muted: #cbd5e1;
        --muted-strong: #e2e8f0;
        --line: #1f2937;
        --line-soft: #334155;
        --line-strong: #475569;
        --line-contrast: #64748b;
        --primary: #60a5fa;
        --primary-hover: #3b82f6;
        --primary-soft: rgba(96, 165, 250, 0.14);
        --primary-soft-border: rgba(96, 165, 250, 0.2);
        --focus: rgba(96, 165, 250, 0.28);
        --good: #4ade80;
        --good-soft: rgba(74, 222, 128, 0.16);
        --warn: #f87171;
        --warn-soft: rgba(248, 113, 113, 0.16);
        --error: #f87171;
        --hover: #1e293b;
        --menu-shadow: 0 10px 24px rgba(2, 6, 23, 0.42);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }

      main {
        max-width: 560px;
        margin: 0 auto;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 20px 24px;
        background: var(--header-bg);
        border-bottom: 1px solid var(--line);
      }

      .header h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 700;
      }

      .icon-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        padding: 0;
        border: 1px solid transparent;
        border-radius: 8px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }

      .icon-button:hover {
        background: var(--primary-soft);
        border-color: var(--primary-soft-border);
        color: var(--ink);
      }

      .icon-button:focus-visible,
      .settings-item:focus-visible,
      input[type="text"]:focus,
      select:focus {
        outline: none;
        box-shadow: 0 0 0 2px var(--focus);
      }

      .icon-button[hidden],
      .settings-page[hidden] {
        display: none;
      }

      .back-button {
        font-size: 18px;
        font-weight: 700;
        line-height: 1;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        margin: 20px 24px;
        overflow: hidden;
      }

      .settings-card {
        flex: 1;
      }

      .settings-page {
        display: block;
      }

      .section {
        padding: 20px;
        border-bottom: 1px solid var(--line);
      }

      .section:last-child {
        border-bottom: none;
      }

      .settings-home-section {
        padding: 8px 0;
      }

      .settings-home-section .settings-item {
        padding: 10px 4px 10px 2px;
      }

      .settings-item[hidden] {
        display: none;
      }

      .settings-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin: 0;
      }

      .settings-item {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 46px;
        padding: 10px 8px;
        border: none;
        border-radius: 12px;
        background: transparent;
        color: var(--ink);
        text-align: left;
        font: inherit;
        cursor: pointer;
        transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
      }

      .settings-item:hover {
        background: var(--hover);
        box-shadow: var(--menu-shadow);
        transform: translateY(-1px);
      }

      .settings-item:focus-visible {
        box-shadow: 0 0 0 2px var(--focus), var(--menu-shadow);
      }

      .settings-item-main {
        min-width: 0;
        flex: 1;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .settings-item-icon {
        flex: 0 0 22px;
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--muted-strong);
      }

      .settings-item-icon svg {
        width: 18px;
        height: 18px;
        stroke-width: 1.9;
      }

      .settings-item-copy {
        min-width: 0;
        display: flex;
        align-items: center;
        flex: 1;
      }

      .settings-item-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--ink);
        line-height: 1.25;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .settings-item-chevron {
        flex: 0 0 auto;
        font-size: 18px;
        font-weight: 500;
        color: var(--muted);
        line-height: 1;
      }

      .settings-item-select {
        cursor: pointer;
      }

      .settings-select {
        width: auto;
        min-width: 88px;
        margin-top: 0;
        padding: 0 16px 0 0;
        border: none;
        border-radius: 0;
        background: transparent;
        color: var(--muted-strong);
        font-size: 14px;
        font-weight: 500;
        text-align: right;
        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, currentColor 50%),
          linear-gradient(135deg, currentColor 50%, transparent 50%);
        background-position:
          calc(100% - 8px) 50%,
          calc(100% - 4px) 50%;
        background-size: 4px 4px, 4px 4px;
        background-repeat: no-repeat;
      }

      label {
        display: block;
        margin-top: 16px;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
      }

      label:first-child { margin-top: 0; }

      .field-block {
        margin-top: 16px;
      }

      .field-title {
        display: block;
        font-size: 12px;
        font-weight: 600;
        color: var(--muted);
      }

      input[type="text"],
      select {
        width: 100%;
        margin-top: 6px;
        padding: 10px 12px;
        border: 1px solid var(--line-strong);
        border-radius: 8px;
        background: var(--card);
        color: var(--ink);
        font: inherit;
        font-size: 14px;
      }

      .radio-group {
        margin-top: 8px;
        padding: 12px;
        border: 1px solid var(--line-soft);
        border-radius: 8px;
        background: var(--card-alt);
      }

      .radio-option {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        color: var(--muted);
      }

      .radio-option + .radio-option {
        margin-top: 8px;
      }

      .radio-option input[type="radio"] {
        accent-color: var(--primary);
        margin: 0;
        width: 14px;
        height: 14px;
      }

      .helper {
        margin-top: 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .settings-footer {
        margin: auto 24px 24px;
        padding-top: 12px;
        padding-bottom: 20px;
        display: flex;
        justify-content: center;
        border-top: 1px solid var(--line);
      }

      .version-button {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 0;
        border: none;
        background: transparent;
        color: var(--muted);
        font: inherit;
        cursor: pointer;
        transition: color 0.15s;
      }

      .version-button:hover {
        color: var(--muted-strong);
      }

      .version-button:focus-visible {
        outline: none;
        box-shadow: 0 0 0 2px var(--focus);
        border-radius: 6px;
      }

      .version-label {
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.01em;
      }

      .version-mode {
        font-size: 12px;
        font-weight: 400;
        color: var(--muted-strong);
      }

      .status {
        margin: 16px 24px;
        padding: 10px 12px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        background: var(--primary-soft);
        color: var(--muted);
      }

      .status.good {
        background: var(--good-soft);
        color: var(--good);
      }

      .status.warn {
        background: var(--warn-soft);
        color: var(--error);
      }

      .notes {
        margin: 20px 24px 24px;
        padding: 16px;
        border: 1px solid var(--line-soft);
        border-radius: 10px;
        background: var(--card-alt);
      }

      .notes h3 {
        margin: 0 0 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .notes ul {
        margin: 0;
        padding-left: 18px;
      }

      .notes li {
        font-size: 13px;
        color: var(--muted);
        line-height: 1.6;
      }

      @media (max-width: 640px) {
        .settings-item {
          min-height: 42px;
          padding: 9px 6px;
        }

        .settings-select {
          min-width: 82px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="header">
        <button id="backButton" class="icon-button back-button" type="button" aria-label="Back to settings" hidden>
          <span aria-hidden="true">&lt;</span>
        </button>
        <h1 id="headerTitle">FoxSpark</h1>
      </div>

      <section class="card settings-card">
        <div id="homePage" class="settings-page">
          <div class="section settings-home-section">
            <div class="settings-list">
              <button id="openApiSettingsButton" class="settings-item" type="button" hidden>
                <span class="settings-item-main">
                  <span class="settings-item-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <circle cx="6" cy="12" r="1.75" stroke="currentColor"></circle>
                      <circle cx="18" cy="6" r="1.75" stroke="currentColor"></circle>
                      <circle cx="18" cy="18" r="1.75" stroke="currentColor"></circle>
                      <path d="M7.6 11.2L16.3 6.8M7.6 12.8l8.7 4.4" stroke="currentColor" stroke-linecap="round"></path>
                    </svg>
                  </span>
                  <span class="settings-item-copy">
                    <span class="settings-item-title" data-i18n="settings.apiGeneration">API &amp; Generation</span>
                  </span>
                </span>
                <span class="settings-item-chevron" aria-hidden="true">&gt;</span>
              </button>

              <button id="toggleOpenModeButton" class="settings-item" type="button">
                <span class="settings-item-main">
                  <span class="settings-item-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <rect x="4" y="5" width="16" height="14" rx="2" stroke="currentColor"></rect>
                      <path d="M10 5v14" stroke="currentColor" stroke-linecap="round"></path>
                    </svg>
                  </span>
                  <span class="settings-item-copy">
                    <span id="hostModeTitle" class="settings-item-title">Switch to Popup</span>
                  </span>
                </span>
              </button>

              <label class="settings-item settings-item-select" for="theme">
                <span class="settings-item-main">
                  <span class="settings-item-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M12 3v2.2M12 18.8V21M4.9 4.9l1.6 1.6M17.5 17.5l1.6 1.6M3 12h2.2M18.8 12H21M4.9 19.1l1.6-1.6M17.5 6.5l1.6-1.6" stroke="currentColor" stroke-linecap="round"></path>
                      <circle cx="12" cy="12" r="4" stroke="currentColor"></circle>
                    </svg>
                  </span>
                  <span class="settings-item-copy">
                    <span class="settings-item-title" data-i18n="label.theme">Theme</span>
                  </span>
                </span>
                <select id="theme" class="settings-select">
                  <option value="light">Light</option>
                  <option value="dark">Dark</option>
                  <option value="system">System</option>
                </select>
              </label>
              <label class="settings-item settings-item-select" for="language">
                <span class="settings-item-main">
                  <span class="settings-item-icon" aria-hidden="true">
                    <svg viewBox="0 0 24 24" fill="none">
                      <path d="M4 6h8M8 4v2m0 0c0 4-1.6 6.6-4 8m4-8c.9 2.3 2.2 4.2 4 5.6M14 18h6M17 15v6" stroke="currentColor" stroke-linecap="round"></path>
                    </svg>
                  </span>
                  <span class="settings-item-copy">
                    <span class="settings-item-title" data-i18n="label.language">Language</span>
                  </span>
                </span>
                <select id="language" class="settings-select">
                  <option value="auto">Auto (Browser)</option>
                  <option value="en">English</option>
                  <option value="zh-CN">简体中文</option>
                  <option value="zh-TW">繁體中文</option>
                  <option value="ja">日本語</option>
                  <option value="ko">한국어</option>
                  <option value="es">Español</option>
                </select>
              </label>
            </div>
          </div>

        </div>

        <div id="apiPage" class="settings-page" hidden>
          <div class="section">
            <label>
              <span data-i18n="label.apiBaseUrl">API Base URL</span>
              <input id="backendBaseUrl" type="text" placeholder="https://api.sayviner.top:8443">
            </label>
            <div class="helper" data-i18n="helper.apiBaseUrlSave">Press Enter or click outside to save the URL.</div>

            <div class="field-block">
              <div class="field-title" data-i18n="label.generationApiMode">Generation API Mode</div>
              <div class="radio-group">
                <div class="radio-option">
                  <input type="radio" name="apiMode" id="apiModeDrafts" value="drafts" checked>
                  <label for="apiModeDrafts" id="apiModeDraftsLabel" data-i18n="mode.draftsApi">Drafts API (/api/v1/drafts/generate)</label>
                </div>
                <div class="radio-option">
                  <input type="radio" name="apiMode" id="apiModeContent" value="content">
                  <label for="apiModeContent" id="apiModeContentLabel" data-i18n="mode.contentApi">Content API (/api/v1/content/generate)</label>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <div id="status" class="status" hidden></div>

      <div class="settings-footer">
        <button id="versionButton" class="version-button" type="button">
          <span id="versionLabel" class="version-label"></span>
          <span id="versionMode" class="version-mode"></span>
        </button>
      </div>

    </main>

    <script src="shared.js"></script>
    <script src="options.js"></script>
  </body>
</html>
