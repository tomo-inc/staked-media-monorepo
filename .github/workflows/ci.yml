name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  be-lint:
    name: "Backend: lint + format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          args: check apps/backend/app/ apps/backend/tests/
      - uses: astral-sh/ruff-action@v3
        with:
          args: format --check apps/backend/app/ apps/backend/tests/

  be-typecheck:
    name: "Backend: typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt pyright
      - run: pyright app/

  be-test:
    name: "Backend: test"
    runs-on: ubuntu-latest
    needs: [be-lint, be-typecheck]
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/ -q

  fe-lint:
    name: "Frontend: lint + format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/browser-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/browser-extension/package-lock.json
      - run: npm ci
      - run: npx biome check --error-on-warnings src/ tests/

  fe-typecheck:
    name: "Frontend: typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/browser-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/browser-extension/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.json

  fe-test:
    name: "Frontend: build + test"
    runs-on: ubuntu-latest
    needs: [fe-lint, fe-typecheck]
    defaults:
      run:
        working-directory: apps/browser-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/browser-extension/package-lock.json
      - run: npm ci
      - run: npm run test:compiled
